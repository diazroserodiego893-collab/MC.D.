<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Final PRO</title>

<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* рҹҺ® CONTROL NUEVO (PC + CELULAR) */
let angleX = 0, angleY = 0, zoom = 700;

/* рҹ–ұпёҸ PC sin click */
window.addEventListener("mousemove", e => {
    angleY += e.movementX * 0.003;
    angleX += e.movementY * 0.003;
});

/* рҹ“ұ TOUCH */
let lastTouchX = null;
let lastTouchY = null;

window.addEventListener("touchstart", e => {
    let t = e.touches[0];
    lastTouchX = t.clientX;
    lastTouchY = t.clientY;
});

window.addEventListener("touchmove", e => {
    let t = e.touches[0];

    let dx = t.clientX - lastTouchX;
    let dy = t.clientY - lastTouchY;

    angleY += dx * 0.004;
    angleX += dy * 0.004;

    lastTouchX = t.clientX;
    lastTouchY = t.clientY;
});

/* рҹ”Қ ZOOM */
window.addEventListener("wheel",e=>{
    zoom += e.deltaY*0.3;
    zoom = Math.max(300, Math.min(1400, zoom));
});

/* вӯҗ ESTRELLAS */
let stars=[];
for(let i=0;i<700;i++){
    stars.push({
        x:(Math.random()-0.5)*4000,
        y:(Math.random()-0.5)*4000,
        z:(Math.random()-0.5)*4000,
        size:Math.random()*2,
        blink:Math.random()*100
    });
}

/* рҹҢ  FUGACES */
let shootingStars=[];
setInterval(()=>{
    if(document.hidden) return;
    if(shootingStars.length<3 && Math.random()<0.5){
        shootingStars.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height/2,
            vx:-12-Math.random()*6,

            life:0,max:50
        });
    }

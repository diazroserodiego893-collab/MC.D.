// funciГіn aleatoria
function obtenerFrasesAleatorias(lista, cantidad){
    let copia = [...lista];
    let seleccion = [];

    for(let i=0;i<cantidad;i++){
        let index = Math.floor(Math.random()*copia.length);
        seleccion.push(copia[index]);
        copia.splice(index,1);
    }
    return seleccion;
}

// SOLO 20
let frases = obtenerFrasesAleatorias(todasFrases, 20);

// ================= CREAR TEXTOS =================
let textSprites = [];

function createText(text, angle, radius){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 512;
    canvas.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText(text, 20, 64);

    const texture = new THREE.CanvasTexture(canvas);

    const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({map:texture,transparent:true})
    );

    sprite.position.set(
        Math.cos(angle)*radius,
        0,
        Math.sin(angle)*radius
    );

    sprite.scale.set(10,3,1);

    galaxy.add(sprite);
    textSprites.push(sprite);
}

// ================= DISTRIBUCION EN ORBITAS =================
let rings = 4;
let perRing = Math.ceil(frases.length / rings);

frases.forEach((f, i)=>{

    let ring = Math.floor(i / perRing);
    let angle = (i % perRing) * (Math.PI*2 / perRing);
    let radius = 8 + ring * 4;

    createText(f, angle, radius);
});


// crear todas
frases.forEach((f,i)=>{
    createText(f, i*0.6, 10 + Math.random()*10);
});

// ================= INTERACCION =================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", e=>{

    mouse.x = (e.clientX / window.innerWidth)*2 - 1;
    mouse.y = -(e.clientY / window.innerHeight)*2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(textSprites);

    if(intersects.length > 0){

        textSprites.forEach(s=>{
            s.scale.set(10,3,1);
            s.material.opacity = 0.3;
        });

        let selected = intersects[0].object;

        selected.scale.set(16,5,1);
        selected.material.opacity = 1;
    }
});

// ================= ANIMATE =================
function animate(){
    requestAnimationFrame(animate);

    // direccion camara
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    let dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    if(keys["w"]) camera.position.add(dir.clone().multiplyScalar(0.8));
    if(keys["s"]) camera.position.add(dir.clone().multiplyScalar(-0.8));

    let right = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

    if(keys["a"]) camera.position.add(right.clone().multiplyScalar(0.8));
    if(keys["d"]) camera.position.add(right.clone().multiplyScalar(-0.8));

    galaxy.rotation.y += 0.002;
    stars.rotation.y += 0.0003;

    renderer.render(scene,camera);
}

animate();
</script>

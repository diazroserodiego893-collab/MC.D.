<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Final PRO</title>

<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 CONTROL (SIN CLICK) */
let angleX = 0, angleY = 0, zoom = 700;

window.addEventListener("mousemove",e=>{
    angleY += e.movementX*0.0025;
    angleX += e.movementY*0.0025;
});

window.addEventListener("wheel",e=>{
    zoom += e.deltaY*0.3;
    zoom = Math.max(300, Math.min(1400, zoom));
});

/* ⭐ ESTRELLAS */
let stars=[];
for(let i=0;i<800;i++){
    stars.push({
        x:(Math.random()-0.5)*4000,
        y:(Math.random()-0.5)*4000,
        z:(Math.random()-0.5)*4000,
        size:Math.random()*1.5,
        blink:Math.random()*100
    });
}

/* 🌠 FUGACES */
let shootingStars=[];
setInterval(()=>{
    if(shootingStars.length<2 && Math.random()<0.4){
        shootingStars.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height/2,
            vx:-10-Math.random()*4,
            vy:5+Math.random()*2,
            life:0,max:40
        });
    }
},1000);

/* 💬 FRASES */
let frases = [
"ᴍᴇ ɢᴜsᴛᴀʀɪ́ᴀ ᴄᴏɴᴏᴄᴇʀᴛᴇ ✨",
"sᴏʟᴏ ᴘɪᴇɴsᴏ ᴇɴ ᴛɪ 💭",
"ᴍɪ ᴍᴏᴛɪᴠᴏ ᴇʀᴇs ᴛᴜ́ 💙",
"ᴍɪ sᴜᴇʀᴛᴇ ғᴜᴇ ᴄᴏɴᴏᴄᴇʀᴛᴇ ✨",
"ɴᴏ ᴘᴇʀᴅᴀᴍᴏs ʟᴀ ᴏᴘᴏʀᴛᴜɴɪᴅᴀᴅ 💫",
"ɴᴏ ᴛᴇ sᴀᴄᴏ ᴅᴇ ᴍɪ ᴍᴇɴᴛᴇ 🌙",
"ᴅᴇᴊᴇᴍᴏs ᴇʟ ᴍɪᴇᴅᴏ ✨",
"¿ᴄʜᴀʀʟᴀ ʏ ᴜɴ ʜᴇʟᴀᴅᴏ? 🍦",
"ᴇsᴀ sᴏɴʀɪsᴀ ᴛᴜʏᴀ 😊",
"ᴍɪ ᴅᴇʙɪʟɪᴅᴀᴅ 💙"
];

let frasesData=[];

/* 🌌 GALAXIA */
let particles=[];
let total=4000, arms=4;

for(let i=0;i<total;i++){
    let radius=Math.random()*420;
    let branch=(i%arms)*(Math.PI*2/arms);
    let spin=radius*0.025;
    let angle=branch+spin;

    let offset=(Math.random()-0.5)*40;
    let tx=Math.cos(angle)*(radius+offset);
    let tz=Math.sin(angle)*(radius+offset);
    let ty=(Math.random()-0.5)*20;

    particles.push({
        x:(Math.random()-0.5)*2000,
        y:(Math.random()-0.5)*2000,
        z:(Math.random()-0.5)*2000,
        tx,ty,tz,
        size:Math.random()*1.2
    });
}

/* ⏳ TIEMPO */
let start=Date.now();
let duration=4000;
let globalRotation=0;
let nextPhraseIndex=0;
let phraseTimer=0;

/* 🎬 LOOP */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let t=(Date.now()-start)/duration;
    if(t>1) t=1;

    globalRotation+=0.002;

    /* ⭐ fondo */
    stars.forEach(s=>{
        s.blink+=0.05;
        let b=0.5+Math.sin(s.blink)*0.5;
        drawPoint(s.x,s.y,s.z,`rgba(255,255,255,${b})`,s.size);
    });

    /* 🌌 galaxia */
    particles.forEach(p=>{
        let x=p.x+(p.tx-p.x)*t;
        let y=p.y+(p.ty-p.y)*t;
        let z=p.z+(p.tz-p.z)*t;

        if(t===1){
            let ang=Math.atan2(z,x)+globalRotation;
            let dist=Math.sqrt(x*x+z*z);
            x=Math.cos(ang)*dist;
            z=Math.sin(ang)*dist;
        }

        drawPoint(x,y,z,"rgb(120,170,255)",p.size);
    });

    /* 💬 FRASES */
    if(t===1){
        phraseTimer++;
        if(phraseTimer>5 && nextPhraseIndex<frases.length){

            let i=nextPhraseIndex;

            // 🔥 MÁS CERCA Y VISIBLE
            let radius=80 + i*2;

            let angle=(i%4)*(Math.PI*2/4);

            frasesData.push({
                texto:frases[i],
                radius,
                angle,
                opacity:0
            });

            nextPhraseIndex++;
            phraseTimer=0;
        }
    }

    frasesData.forEach(f=>{
        f.opacity+=0.04;
        if(f.opacity>1) f.opacity=1;

        let ang=f.angle+globalRotation;

        let x=Math.cos(ang)*f.radius;
        let z=Math.sin(ang)*f.radius;

        let cosY=Math.cos(angleY);
        let sinY=Math.sin(angleY);
        let dx=cosY*x - sinY*z;
        let dz=sinY*x + cosY*z;

        let cosX=Math.cos(angleX);
        let sinX=Math.sin(angleX);
        let dy=- sinX*dz;
        dz= cosX*dz;

        if(dz < -zoom + 10) return;

        let scale=zoom/(zoom+dz);

        let px=dx*scale + canvas.width/2;
        let py=dy*scale + canvas.height/2;

        ctx.fillStyle=`rgba(255,255,255,${f.opacity})`;

        // 🔥 MÁS GRANDES
        ctx.font=`${28*scale}px 'Segoe UI','Arial Unicode MS',sans-serif`;

        ctx.fillText(f.texto,px,py);

        f.angle+=0.002;
    });

    /* 🌠 fugaces */
    shootingStars.forEach((s,i)=>{
        ctx.beginPath();
        ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x+40,s.y-20);
        ctx.strokeStyle="white";
        ctx.stroke();

        s.x+=s.vx;
        s.y+=s.vy;
        s.life++;
        if(s.life>s.max) shootingStars.splice(i,1);
    });

    /* 🖋️ MARCA DE AGUA */
    ctx.fillStyle="rgba(180,220,255,0.7)";
    ctx.font="14px sans-serif";
    ctx.textAlign="right";
    ctx.fillText("De: Diego.D", canvas.width-20, canvas.height-30);
    ctx.fillText("Para: Maria.C", canvas.width-20, canvas.height-10);

    requestAnimationFrame(draw);
}

/* 🧠 PROYECCIÓN */
function drawPoint(x,y,z,color,size){
    let cosY=Math.cos(angleY), sinY=Math.sin(angleY);
    let dx=cosY*x - sinY*z;
    let dz=sinY*x + cosY*z;

    let cosX=Math.cos(angleX), sinX=Math.sin(angleX);
    let dy=cosX*y - sinX*dz;
    dz=sinX*y + cosX*dz;

    if(dz<-zoom+50) return;

    let scale=zoom/(zoom+dz);

    let px=dx*scale + canvas.width/2;
    let py=dy*scale + canvas.height/2;

    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(px,py,size*scale,0,Math.PI*2);
    ctx.fill();
}

draw();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 MOUSE RELATIVO */
let mouse = {x:0,y:0};

window.addEventListener("mousemove", e=>{
    mouse.x = (e.clientX - canvas.width/2) / canvas.width;
    mouse.y = (e.clientY - canvas.height/2) / canvas.height;
});

/* 🌟 ESTRELLAS */
let estrellas=[];
for(let i=0;i<200;i++){
    estrellas.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        depth:Math.random()
    });
}

/* 🌌 GALAXIA */
let particles=[];
for(let i=0;i<1200;i++){
    particles.push({
        angle:Math.random()*Math.PI*2,
        radius:Math.random()*300,
        speed:0.001 + Math.random()*0.002,
        size:Math.random()*1.5,
        color:Math.random()>0.5?"#5b8cff":"#8a4dff",
        depth:Math.random()
    });
}

/* 🎬 ANIMACIÓN */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    /* ✨ ESTRELLAS (parallax) */
    estrellas.forEach(s=>{
        let x = s.x + mouse.x * 50 * s.depth;
        let y = s.y + mouse.y * 50 * s.depth;

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(x,y,s.size,0,Math.PI*2);
        ctx.fill();
    });

    /* 🌌 GALAXIA */
    particles.forEach(p=>{
        p.angle += p.speed;

        let x = Math.cos(p.angle)*p.radius;
        let y = Math.sin(p.angle)*p.radius*0.6;

        /* efecto profundidad */
        x += mouse.x * 100 * p.depth;
        y += mouse.y * 100 * p.depth;

        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(cx + x, cy + y, p.size, 0, Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

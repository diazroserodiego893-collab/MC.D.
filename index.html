<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#watermark{
 position:fixed;
 bottom:10px;
 right:15px;
 color:white;
 opacity:0.7;
 text-shadow:0 0 10px white;
 font-size:14px;
}
</style>
</head>

<body>

<div id="watermark">
De: Diego.D<br>Para: Maria.C
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== ESCENA =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,5,40);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLES =====
let keys = {};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove",e=>{
 yaw -= e.movementX * 0.002;
 pitch -= e.movementY * 0.002;
 pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
});

// ===== ESTRELLAS =====
const starGeo = new THREE.BufferGeometry();
let starPos=[];

for(let i=0;i<5000;i++){
 starPos.push(
  (Math.random()-0.5)*300,
  (Math.random()-0.5)*300,
  (Math.random()-0.5)*300
 );
}

starGeo.setAttribute("position",new THREE.Float32BufferAttribute(starPos,3));

const starMat=new THREE.PointsMaterial({
 color:0xffffff,
 size:0.6
});

const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

// ===== GALAXIA (BRAZOS ANCHOS) =====
const galaxy = new THREE.Group();
scene.add(galaxy);

const COUNT = 9000;
const geo = new THREE.BufferGeometry();

let pos=[];
let col=[];

for(let i=0;i<COUNT;i++){

 let r = Math.random()*20;
 let spin = r * 1.5;

 // brazos mГЎs abiertos
 let spread = 3;

 let x = Math.cos(spin)*r + (Math.random()-0.5)*spread;
 let z = Math.sin(spin)*r + (Math.random()-0.5)*spread;
 let y = (Math.random()-0.5)*3;

 pos.push(x,y,z);

 let color = new THREE.Color(
  0.6,
  0.6,
  1
 );

 col.push(color.r,color.g,color.b);
}

geo.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
geo.setAttribute("color",new THREE.Float32BufferAttribute(col,3));

const mat=new THREE.PointsMaterial({
 size:0.3,
 vertexColors:true
});

const points=new THREE.Points(geo,mat);
galaxy.add(points);

// ===== FORMACION =====
let start=Date.now();
let forming=true;

// ===== FRASES (PEGA AQUГҚ TUS 80) =====
let frases = [
"бҙҚбҙҮ ЙўбҙңsбҙӣбҙҖКҖЙӘМҒбҙҖ бҙ„бҙҸЙҙбҙҸбҙ„бҙҮКҖбҙӣбҙҮ",
"бҙҚЙӘ бҙҚбҙҸбҙӣЙӘбҙ бҙҸ бҙҮКҖбҙҮs бҙӣбҙңМҒ",
"бҙҚЙӘ sбҙңбҙҮКҖбҙӣбҙҮ Т“бҙңбҙҮ бҙ„бҙҸЙҙбҙҸбҙ„бҙҮКҖбҙӣбҙҮ",
"бҙ…бҙҮбҙҠбҙҮбҙҚбҙҸs бҙҮКҹ бҙҚЙӘбҙҮбҙ…бҙҸ",
"ЙҙбҙҸ бҙҳбҙҮКҖбҙ…бҙҖбҙҚбҙҸs КҹбҙҖ бҙҸбҙҳбҙҸКҖбҙӣбҙңЙҙЙӘбҙ…бҙҖбҙ…",
"бҙҮsбҙҖ sбҙҸЙҙКҖЙӘsбҙҖ бҙӣбҙңКҸбҙҖ",
"бҙҚЙӘ бҙ…бҙҮКҷЙӘКҹЙӘбҙ…бҙҖбҙ…",
"ЙҙбҙҸ бҙӣбҙҮ sбҙҖбҙ„бҙҸ бҙ…бҙҮ бҙҚЙӘ бҙҚбҙҮЙҙбҙӣбҙҮ",
"КҹбҙҖ бҙҮsбҙӣКҖбҙҮКҹКҹбҙҖ З«бҙңбҙҮ бҙҚбҙҖМҒs КҷКҖЙӘКҹКҹбҙҖ бҙҮКҖбҙҮs бҙӣбҙңМҒ",
"З«бҙңЙӘбҙҮКҖбҙҸ sбҙҮКҖ бҙҳбҙҖКҖбҙӣбҙҮ бҙ…бҙҮ бҙӣбҙң бҙңЙҙЙӘбҙ бҙҮКҖsбҙҸ",

"бҙҚбҙҮ КңбҙҖбҙ„бҙҮs бҙҸКҹбҙ ЙӘбҙ…бҙҖКҖ бҙ…бҙҮ бҙҚЙӘ КҖбҙҖбҙўбҙҸМҒЙҙ",
"ЙҙбҙҸ З«бҙңЙӘбҙҮКҖбҙҸ бҙҖКҹЙўбҙҸ Т“бҙңЙўбҙҖбҙў",
"ЙӘКҹбҙңбҙҚЙӘЙҙбҙҖs бҙҚЙӘ бҙ ЙӘбҙ…бҙҖ",
"ВҝКҸ sЙӘ бҙ…бҙҮsбҙ„бҙңКҷКҖЙӘбҙҚбҙҸs бҙңЙҙ бҙҚбҙңЙҙбҙ…бҙҸ?",
"бҙңЙҙбҙҖ бҙҳбҙҮЗ«бҙңбҙҮЙҙМғбҙҖ бҙ„бҙҸЙӘЙҙбҙ„ЙӘбҙ…бҙҮЙҙбҙ„ЙӘбҙҖ",
"бҙҚбҙҮ КңбҙҖбҙ„бҙҮs sбҙҮКҖ бҙҚбҙҮбҙҠбҙҸКҖ",
"бҙӣЙӘбҙҮЙҙбҙҮs бҙҮsбҙҮ бҙҖКҹЙўбҙҸ З«бҙңбҙҮ бҙҚбҙҮ бҙҮЙҙбҙ„бҙҖЙҙбҙӣбҙҖ",
"бҙ„бҙҸЙҙбҙӣЙӘЙўбҙҸ бҙӣбҙҸбҙ…бҙҸ бҙҮs бҙҚбҙҮбҙҠбҙҸКҖ",
"бҙ„бҙңКҖЙӘбҙҸsЙӘбҙ…бҙҖбҙ… бҙ…бҙҮ бҙӣЙӘ",
"Вҝбҙ„КңбҙҖКҖКҹбҙҖ КҸ бҙңЙҙ КңбҙҮКҹбҙҖбҙ…бҙҸ?",

"КҹбҙҖ бҙҚЙӘКҖбҙҖбҙ…бҙҖ З«бҙңбҙҮ бҙҚбҙҮ бҙҮЙҙбҙ бҙңбҙҮКҹбҙ бҙҮ",
"бҙңЙҙбҙҖ КңЙӘsбҙӣбҙҸКҖЙӘбҙҖ бҙҳбҙҸКҖ бҙҮsбҙ„КҖЙӘКҷЙӘКҖ",
"бҙҚЙӘ бҙҚбҙҸбҙӣЙӘбҙ бҙҸ бҙҮКҖбҙҮs бҙӣбҙңМҒ",
"sбҙҸКҹбҙҸ З«бҙңЙӘбҙҮКҖбҙҸ бҙңЙҙбҙҖ sбҙҸЙҙКҖЙӘsбҙҖ",
"sбҙҸКҹбҙҸ бҙҳбҙҖКҖбҙҖ бҙӣЙӘ",
"бҙңЙҙ бҙ…бҙҮбҙӣбҙҖКҹКҹбҙҮ бҙҳбҙңбҙҮбҙ…бҙҮ бҙҚбҙҮбҙҠбҙҸКҖбҙҖКҖ бҙӣбҙң бҙ…ЙӘМҒбҙҖ",
"бҙҮsбҙҳбҙҮКҖбҙҸ КҹбҙҖ бҙҸбҙҳбҙҸКҖбҙӣбҙңЙҙЙӘбҙ…бҙҖбҙ…",
"бҙ…бҙҮбҙӣЙӘбҙҮЙҙбҙҮs бҙҮКҹ бҙӣЙӘбҙҮбҙҚбҙҳбҙҸ",
"бҙҳбҙҮЙҙsбҙҖЙҙбҙ…бҙҸ бҙҮЙҙ бҙӣЙӘ",
"бҙҳбҙҖКҹбҙҖКҷКҖбҙҖs sбҙҸКҷКҖбҙҖЙҙ",

"ЙўбҙҖЙҙбҙҖs бҙ…бҙҮ бҙӣбҙҸбҙ…бҙҸ бҙҳбҙҮКҖбҙҸ sбҙҸКҹбҙҸ бҙ„бҙҸЙҙбҙӣЙӘЙўбҙҸ",
"sбҙҸКҹбҙҸ бҙ„бҙҸбҙҚбҙҳбҙҖКҖбҙӣЙӘКҖ бҙӣЙӘбҙҮбҙҚбҙҳбҙҸ",
"sЙӘЙҙ бҙҳКҹбҙҖЙҙбҙҮs",
"sбҙҸКҹбҙҸ ЙҙбҙҸsбҙҸбҙӣКҖбҙҸs",
"sЙӘЙҙ бҙҳКҖбҙҮбҙҸбҙ„бҙңбҙҳбҙҖбҙ„ЙӘбҙҸЙҙбҙҮs",
"бҙ„бҙңбҙҖЙҙбҙ…бҙҸ З«бҙңЙӘбҙҮКҖбҙҖs",
"sЙӘЙҙ бҙҖбҙҳбҙңКҖбҙҸs",
"КҸбҙҸ бҙӣбҙҮ КңбҙҖЙўбҙҸ sбҙҸЙҙКҖбҙҮЙӘКҖ",
"бҙӣбҙңМҒ бҙҚбҙҮ бҙ…ЙӘКҖбҙҖМҒs",
"sЙӘ ЙҙбҙҸs КҹбҙҮбҙҮбҙҚбҙҸs",
"З«бҙңбҙҮ бҙ„бҙҸЙҙбҙӣЙӘЙҙбҙңбҙҮ бҙҮsбҙӣбҙҮ бҙ„бҙңбҙҮЙҙбҙӣбҙҸ"
];

// ===== TEXTO SIN FONDO =====
let textSprites=[];

function createText(text, angle, radius){

 const canvas = document.createElement("canvas");
 const ctx = canvas.getContext("2d");

 canvas.width = 512;
 canvas.height = 128;

 ctx.clearRect(0,0,512,128);

 ctx.font = "bold 32px Arial";
 ctx.fillStyle = "white";

 ctx.shadowColor = "white";
 ctx.shadowBlur = 15;

 ctx.fillText(text,20,70);

 const texture = new THREE.CanvasTexture(canvas);

 const material = new THREE.SpriteMaterial({
  map: texture,
  transparent: true,
  depthTest: false, // рҹ”Ҙ SIEMPRE visible
  depthWrite: false
 });

 const sprite = new THREE.Sprite(material);

 sprite.position.set(
  Math.cos(angle)*radius,
  0,
  Math.sin(angle)*radius
 );

 sprite.scale.set(8,2.5,1);
 sprite.material.opacity = 0;

 galaxy.add(sprite);
 textSprites.push(sprite);

 let op=0;
 let fade=setInterval(()=>{
  op+=0.05;
  sprite.material.opacity=op;
  if(op>=1) clearInterval(fade);
 },50);
}

// apariciГіn progresiva
let fi=0;
setInterval(()=>{
 if(!forming && fi<frases.length){
  createText(frases[fi],fi*0.4,10+Math.random()*10);
  fi++;
 }
},700);

// ===== FUGACES =====
let shooting=[];

function shoot(){
 if(shooting.length>=3) return;

 let geo=new THREE.BufferGeometry();
 geo.setAttribute("position",new THREE.Float32BufferAttribute([0,0,0],3));

 let mat=new THREE.PointsMaterial({color:0xffffff,size:1});
 let s=new THREE.Points(geo,mat);

 s.position.set(
  (Math.random()-0.5)*100,
  (Math.random()-0.5)*100,
  (Math.random()-0.5)*100
 );

 s.vel=new THREE.Vector3(
  (Math.random()-0.5)*3,
  (Math.random()-0.5)*3,
  (Math.random()-0.5)*3
 );

 scene.add(s);
 shooting.push(s);

 setTimeout(()=>{
  scene.remove(s);
  shooting=shooting.filter(x=>x!==s);
 },1200);
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 let t=(Date.now()-start)/1000;

 if(forming){
  let p=Math.min(t/6,1);
  galaxy.scale.set(p,p,p);
  if(p>=1) forming=false;
 }

 // movimiento
 let speed=1.2;

 let dir=new THREE.Vector3(
  Math.cos(pitch)*Math.sin(yaw),
  Math.sin(pitch),
  Math.cos(pitch)*Math.cos(yaw)
 );

 let right=new THREE.Vector3(
  Math.sin(yaw - Math.PI/2),
  0,
  Math.cos(yaw - Math.PI/2)
 );

 if(keys["w"]) camera.position.add(dir.clone().multiplyScalar(speed));
 if(keys["s"]) camera.position.add(dir.clone().multiplyScalar(-speed));
 if(keys["a"]) camera.position.add(right.clone().multiplyScalar(speed));
 if(keys["d"]) camera.position.add(right.clone().multiplyScalar(-speed));
 if(keys["q"]) camera.position.y+=speed;
 if(keys["e"]) camera.position.y-=speed;

 camera.lookAt(0,0,0);

 // rotaciГіn
 galaxy.rotation.y+=0.002;
 stars.rotation.y+=0.0003;

 if(Math.random()<0.03) shoot();

 shooting.forEach(s=>{
  s.position.add(s.vel.clone().multiplyScalar(2.5));
 });

 renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>

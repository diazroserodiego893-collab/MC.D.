<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Realista</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#watermark{
 position:fixed;
 bottom:10px;
 right:15px;
 color:white;
 opacity:0.7;
 text-shadow:0 0 12px white;
 font-size:14px;
}
</style>
</head>

<body>

<div id="watermark">
De: Diego.D<br>Para: Maria.C
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== ESCENA =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,5,50);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== CONTROLES =====
let keys={};

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove",e=>{
 if(document.pointerLockElement===document.body){
  camera.rotation.y -= e.movementX*0.002;
  camera.rotation.x -= e.movementY*0.002;
  camera.rotation.x = Math.max(-1.5,Math.min(1.5,camera.rotation.x));
 }
});

// ===== ESTRELLAS =====
const starGeo = new THREE.BufferGeometry();
let starPos=[];

for(let i=0;i<6000;i++){
 starPos.push(
  (Math.random()-0.5)*400,
  (Math.random()-0.5)*400,
  (Math.random()-0.5)*400
 );
}

starGeo.setAttribute("position",new THREE.Float32BufferAttribute(starPos,3));

const starMat=new THREE.PointsMaterial({
 color:0xffffff,
 size:0.7,
 transparent:true,
 opacity:0.8
});

const stars=new THREE.Points(starGeo,starMat);
scene.add(stars);

// ===== GALAXIA REAL =====
const galaxy = new THREE.Group();
scene.add(galaxy);

const COUNT = 12000;
const geo = new THREE.BufferGeometry();

let pos=[];
let col=[];

const arms = 4;

for(let i=0;i<COUNT;i++){

 let r = Math.random()*25;

 let armAngle = ((i%arms)/arms)*Math.PI*2;

 let spin = r*1.2;

 let randomOffset = Math.pow(Math.random(),2)*2;

 let x = Math.cos(armAngle+spin)*r + randomOffset*(Math.random()-0.5);
 let z = Math.sin(armAngle+spin)*r + randomOffset*(Math.random()-0.5);

 let y = (Math.random()-0.5)*3 * (1 - r/25);

 pos.push(x,y,z);

 // color degradado
 let mix = r/25;

 let color = new THREE.Color();
 color.setRGB(
   0.4 + 0.4*(1-mix),
   0.5,
   1
 );

 col.push(color.r,color.g,color.b);
}

geo.setAttribute("position",new THREE.Float32BufferAttribute(pos,3));
geo.setAttribute("color",new THREE.Float32BufferAttribute(col,3));

const mat=new THREE.PointsMaterial({
 size:0.25,
 vertexColors:true,
 transparent:true,
 opacity:0.9
});

const points=new THREE.Points(geo,mat);
galaxy.add(points);

// ===== FORMACION =====
let start=Date.now();
let forming=true;

// ===== FRASES (no las quitamos) =====
let frases = [
"ᴍᴇ ɢᴜsᴛᴀʀɪ́ᴀ ᴄᴏɴᴏᴄᴇʀᴛᴇ ✨",
"ʜᴏʟᴀ, ᴜɴɪᴠᴇʀsᴏ 🌌",
"ᴇsᴀ sᴏɴʀɪsᴀ ᴛᴜʏᴀ 😊",
"ᴄᴏɴᴛɪɢᴏ ᴛᴏᴅᴏ ᴇs ᴍᴇᴊᴏʀ 💙",
"¿ʏ sɪ ʜᴀʙʟᴀᴍᴏs? 💬",
"sɪʟᴇɴᴄɪᴏ ʙᴏɴɪᴛᴏ 🌙",
"ᴘᴏsɪʙɪʟɪᴅᴀᴅ ᴀʙɪᴇʀᴛᴀ ✨",
"ᴄʜᴀʀʟᴀ sɪɴ ʀᴇʟᴏᴊ ☕"
];

function crearTexto(t,ang,r){
 let c=document.createElement("canvas");
 let ctx=c.getContext("2d");

 c.width=512; c.height=128;

 ctx.fillStyle="white";
 ctx.font="28px Arial";
 ctx.fillText(t,20,64);

 let tex=new THREE.CanvasTexture(c);
 let mat=new THREE.SpriteMaterial({map:tex,transparent:true});
 let sp=new THREE.Sprite(mat);

 sp.position.set(Math.cos(ang)*r,0,Math.sin(ang)*r);
 sp.scale.set(10,3,1);
 sp.material.opacity=0;

 galaxy.add(sp);

 let op=0;
 let fade=setInterval(()=>{
  op+=0.05;
  sp.material.opacity=op;
  if(op>=1) clearInterval(fade);
 },50);
}

let fi=0;
setInterval(()=>{
 if(!forming && fi<frases.length){
  crearTexto(frases[fi],fi*0.5,12+Math.random()*8);
  fi++;
 }
},700);

// ===== FUGACES =====
let shooting=[];

function shoot(){
 if(shooting.length>=3) return;

 let geo=new THREE.BufferGeometry();
 geo.setAttribute("position",new THREE.Float32BufferAttribute([0,0,0],3));

 let mat=new THREE.PointsMaterial({color:0xffffff,size:1});
 let s=new THREE.Points(geo,mat);

 s.position.set(
  (Math.random()-0.5)*150,
  (Math.random()-0.5)*150,
  (Math.random()-0.5)*150
 );

 s.vel=new THREE.Vector3(
  (Math.random()-0.5)*4,
  (Math.random()-0.5)*4,
  (Math.random()-0.5)*4
 );

 scene.add(s);
 shooting.push(s);

 setTimeout(()=>{
  scene.remove(s);
  shooting=shooting.filter(x=>x!==s);
 },1200);
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 let t=(Date.now()-start)/1000;

 // FORMACION
 if(forming){
  let p=Math.min(t/6,1);
  galaxy.scale.set(p,p,p);
  if(p>=1) forming=false;
 }

 // MOVIMIENTO
 let speed=1;

 let dir=new THREE.Vector3();
 camera.getWorldDirection(dir);

 if(keys["w"]) camera.position.add(dir.clone().multiplyScalar(speed));
 if(keys["s"]) camera.position.add(dir.clone().multiplyScalar(-speed));

 let right=new THREE.Vector3().crossVectors(camera.up,dir).normalize();

 if(keys["a"]) camera.position.add(right.clone().multiplyScalar(speed));
 if(keys["d"]) camera.position.add(right.clone().multiplyScalar(-speed));

 if(keys["q"]) camera.position.y+=speed;
 if(keys["e"]) camera.position.y-=speed;

 camera.lookAt(0,0,0);

 // ROTACIONES
 galaxy.rotation.y+=0.002;
 stars.rotation.y+=0.0004;

 // FUGACES
 if(Math.random()<0.04) shoot();

 shooting.forEach(s=>{
  s.position.add(s.vel.clone().multiplyScalar(2.5));
 });

 renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>

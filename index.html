<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Pro</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 CONTROL */
let angleX = 0;
let angleY = 0;
let zoom = 500;

let dragging = false;

window.addEventListener("mousedown", ()=> dragging=true);
window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(dragging){
        angleY += e.movementX * 0.005;
        angleX += e.movementY * 0.005;
    }
});

window.addEventListener("wheel", e=>{
    zoom += e.deltaY * 0.3;
    if(zoom < 250) zoom = 250;
    if(zoom > 1200) zoom = 1200;
});

/* 🎨 COLORES */
const colores = [
    "#4da6ff",
    "#6a8cff",
    "#8a4dff",
    "#a066ff",
    "#5bc0ff"
];

/* 🌌 PARTICULAS */
let particles=[];
let total = 2500;

for(let i=0;i<total;i++){

    // distribución en brazos (tipo la imagen)
    let arms = 6;
    let arm = Math.floor(Math.random()*arms);

    let angle = (arm / arms) * Math.PI * 2;
    angle += Math.random()*0.5;

    let radius = Math.random()*350;

    let targetX = Math.cos(angle)*radius;
    let targetZ = Math.sin(angle)*radius;

    // inicio disperso
    particles.push({
        x:(Math.random()-0.5)*1500,
        y:(Math.random()-0.5)*200,
        z:(Math.random()-0.5)*1500,

        tx:targetX,
        ty:(Math.random()-0.5)*20,
        tz:targetZ,

        size:Math.random()*1.5,
        color:colores[Math.floor(Math.random()*colores.length)]
    });
}

/* ⏳ TIEMPO DE CREACIÓN */
let startTime = Date.now();
let duration = 6000;

/* 🎬 ANIMACIÓN */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let t = (Date.now() - startTime) / duration;
    if(t > 1) t = 1;

    particles.forEach(p=>{

        /* interpolación (formación) */
        let x = p.x + (p.tx - p.x)*t;
        let y = p.y + (p.ty - p.y)*t;
        let z = p.z + (p.tz - p.z)*t;

        /* giro cuando ya está formada */
        if(t === 1){
            let angle = Math.atan2(z,x) + 0.002;
            let dist = Math.sqrt(x*x + z*z);

            x = Math.cos(angle)*dist;
            z = Math.sin(angle)*dist;
        }

        /* rotación cámara */
        let cosY = Math.cos(angleY);
        let sinY = Math.sin(angleY);
        let dx = cosY*x - sinY*z;
        let dz = sinY*x + cosY*z;

        let cosX = Math.cos(angleX);
        let sinX = Math.sin(angleX);
        let dy = cosX*y - sinX*dz;
        dz = sinX*y + cosX*dz;

        if(dz < -zoom + 50) return;

        let scale = zoom / (zoom + dz);

        let px = dx * scale + cx;
        let py = dy * scale + cy;

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(px, py, p.size * scale, 0, Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

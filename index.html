<script>
// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= MOUSE LOOK =================
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e => {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
});

// ================= MOVIMIENTO =================
let keys = {};
document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

camera.position.set(0,10,40);

// ================= ESTRELLAS =================
const starGeo = new THREE.BufferGeometry();
let starPositions = [];

for(let i=0;i<5000;i++){
    starPositions.push(
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300
    );
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPositions,3));

const stars = new THREE.Points(
    starGeo,
    new THREE.PointsMaterial({color:0xffffff,size:0.6})
);

scene.add(stars);

// ================= GALAXIA =================
const galaxy = new THREE.Group();
scene.add(galaxy);

const positions = [];
const colors = [];

for(let i=0;i<9000;i++){

    let radius = Math.random()*20;
    let spin = radius * 1.5;

    let x = Math.cos(spin)*radius;
    let z = Math.sin(spin)*radius;

    let y = (Math.random()-0.5)*1; // MÁS PLANO

    positions.push(x,y,z);

    let color = new THREE.Color(
        0.5 + Math.random()*0.5,
        0.5,
        1
    );

    colors.push(color.r,color.g,color.b);
}

const geo = new THREE.BufferGeometry();
geo.setAttribute("position", new THREE.Float32BufferAttribute(positions,3));
geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));

const points = new THREE.Points(
    geo,
    new THREE.PointsMaterial({size:0.25,vertexColors:true})
);

galaxy.add(points);

// ================= FRASES =================
let frases = ["Hola universo 🌌","Eres mi motivo 💙","Me gustas ✨","Tu sonrisa 😊"];

let textSprites = [];

function createText(text, angle, radius){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 512;
    canvas.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText(text, 20, 64);

    const texture = new THREE.CanvasTexture(canvas);

    const sprite = new THREE.Sprite(
        new THREE.SpriteMaterial({map:texture,transparent:true})
    );

    sprite.position.set(
        Math.cos(angle)*radius,
        0,
        Math.sin(angle)*radius
    );

    sprite.scale.set(10,3,1);
    galaxy.add(sprite);

    textSprites.push(sprite);
}

// crear todas
frases.forEach((f,i)=>{
    createText(f, i*0.6, 10 + Math.random()*10);
});

// ================= INTERACCION =================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", e=>{

    mouse.x = (e.clientX / window.innerWidth)*2 - 1;
    mouse.y = -(e.clientY / window.innerHeight)*2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersects = raycaster.intersectObjects(textSprites);

    if(intersects.length > 0){

        textSprites.forEach(s=>{
            s.scale.set(10,3,1);
            s.material.opacity = 0.3;
        });

        let selected = intersects[0].object;

        selected.scale.set(16,5,1);
        selected.material.opacity = 1;
    }
});

// ================= ANIMATE =================
function animate(){
    requestAnimationFrame(animate);

    // direccion camara
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    let dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    if(keys["w"]) camera.position.add(dir.clone().multiplyScalar(0.8));
    if(keys["s"]) camera.position.add(dir.clone().multiplyScalar(-0.8));

    let right = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

    if(keys["a"]) camera.position.add(right.clone().multiplyScalar(0.8));
    if(keys["d"]) camera.position.add(right.clone().multiplyScalar(-0.8));

    galaxy.rotation.y += 0.002;
    stars.rotation.y += 0.0003;

    renderer.render(scene,camera);
}

animate();
</script>

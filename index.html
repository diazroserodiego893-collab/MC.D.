<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 CONTROL DE CÁMARA */
let angleX = 0;
let angleY = 0;
let zoom = 400;

/* mouse */
let dragging = false;

window.addEventListener("mousedown", ()=> dragging=true);
window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(dragging){
        angleY += e.movementX * 0.005;
        angleX += e.movementY * 0.005;
    }
});

/* zoom */
window.addEventListener("wheel", e=>{
    zoom += e.deltaY * 0.3;
    if(zoom < 100) zoom = 100;
    if(zoom > 1000) zoom = 1000;
});

/* 🌌 GALAXIA (3D) */
let particles=[];
for(let i=0;i<1500;i++){
    let r = Math.random()*300;
    let a = Math.random()*Math.PI*2;

    particles.push({
        x: Math.cos(a)*r,
        y: (Math.random()-0.5)*50,
        z: Math.sin(a)*r,
        size: Math.random()*1.5,
        color: Math.random()>0.5?"#5b8cff":"#8a4dff"
    });
}

/* 🎬 ANIMACIÓN */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    particles.forEach(p=>{

        /* rotación */
        let x = p.x;
        let y = p.y;
        let z = p.z;

        /* rotar Y */
        let cosY = Math.cos(angleY);
        let sinY = Math.sin(angleY);
        let dx = cosY*x - sinY*z;
        let dz = sinY*x + cosY*z;

        /* rotar X */
        let cosX = Math.cos(angleX);
        let sinX = Math.sin(angleX);
        let dy = cosX*y - sinX*dz;
        dz = sinX*y + cosX*dz;

        /* proyección */
        let scale = zoom / (zoom + dz);
        let px = dx * scale + cx;
        let py = dy * scale + cy;

        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(px, py, p.size * scale, 0, Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

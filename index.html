<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Final</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 CONTROL */
let angleX = 0;
let angleY = 0;
let zoom = 600;

let dragging = false;

window.addEventListener("mousedown", ()=> dragging=true);
window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(dragging){
        angleY += e.movementX * 0.004;
        angleX += e.movementY * 0.004;
    }
});

window.addEventListener("wheel", e=>{
    zoom += e.deltaY * 0.3;
    if(zoom < 300) zoom = 300;
    if(zoom > 1200) zoom = 1200;
});

/* ⭐ ESTRELLAS FONDO */
let stars=[];
for(let i=0;i<800;i++){
    stars.push({
        x:(Math.random()-0.5)*3000,
        y:(Math.random()-0.5)*3000,
        z:(Math.random()-0.5)*3000,
        size:Math.random()*1.5,
        blink:Math.random()*100
    });
}

/* 🌠 ESTRELLAS FUGACES (máx 3) */
let shootingStars=[];

function spawnShootingStar(){
    if(shootingStars.length >= 3) return;

    shootingStars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height/2,
        vx: -10 - Math.random()*5,
        vy: 5 + Math.random()*3,
        life:0,
        maxLife:60
    });
}

setInterval(()=>{
    if(Math.random() < 0.5){
        spawnShootingStar();
    }
}, 800);

/* 🌌 GALAXIA */
let particles=[];
let total = 6000;
let arms = 4;

for(let i=0;i<total;i++){

    let radius = Math.random()*400;
    let branch = (i % arms) * (Math.PI*2/arms);
    let spin = radius * 0.02;
    let angle = branch + spin;

    let randomX = (Math.random()-0.5)*20;
    let randomY = (Math.random()-0.5)*10;
    let randomZ = (Math.random()-0.5)*20;

    let tx = Math.cos(angle)*radius + randomX;
    let tz = Math.sin(angle)*radius + randomZ;
    let ty = randomY;

    particles.push({
        // inicio disperso
        x:(Math.random()-0.5)*2000,
        y:(Math.random()-0.5)*2000,
        z:(Math.random()-0.5)*2000,

        // destino galaxia
        tx,ty,tz,

        size:Math.random()*1.5,
        baseRadius:radius
    });
}

/* ⏳ ANIMACIÓN DE FORMACIÓN */
let startTime = Date.now();
let duration = 6000;

/* 🎬 LOOP */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let t = (Date.now() - startTime) / duration;
    if(t > 1) t = 1;

    /* ⭐ ESTRELLAS FONDO */
    stars.forEach(s=>{
        s.blink += 0.05;
        let brightness = (Math.sin(s.blink)+1)/2;

        drawPoint(s.x,s.y,s.z,`rgba(255,255,255,${brightness})`,s.size);
    });

    /* 🌌 GALAXIA */
    particles.forEach(p=>{

        let x = p.x + (p.tx - p.x)*t;
        let y = p.y + (p.ty - p.y)*t;
        let z = p.z + (p.tz - p.z)*t;

        /* giro cuando ya está formada */
        if(t === 1){
            let angle = Math.atan2(z,x)+0.002;
            let dist = Math.sqrt(x*x+z*z);
            x = Math.cos(angle)*dist;
            z = Math.sin(angle)*dist;
        }

        /* color según distancia (núcleo blanco) */
        let dist = Math.sqrt(x*x+z*z);
        let mix = dist/400;

        let r = 200 + 55*(1-mix);
        let g = 120 + 80*(1-mix);
        let b = 255;

        drawPoint(x,y,z,`rgb(${r},${g},${b})`,p.size);
    });

    /* 🌠 ESTRELLAS FUGACES */
    shootingStars.forEach((s,i)=>{

        ctx.beginPath();
        ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x + 40, s.y - 20);
        ctx.strokeStyle="white";
        ctx.lineWidth=2;
        ctx.stroke();

        s.x += s.vx;
        s.y += s.vy;
        s.life++;

        if(s.life > s.maxLife){
            shootingStars.splice(i,1);
        }
    });

    requestAnimationFrame(draw);
}

/* 🧠 PROYECCIÓN 3D */
function drawPoint(x,y,z,color,size){

    let cosY = Math.cos(angleY);
    let sinY = Math.sin(angleY);
    let dx = cosY*x - sinY*z;
    let dz = sinY*x + cosY*z;

    let cosX = Math.cos(angleX);
    let sinX = Math.sin(angleX);
    let dy = cosX*y - sinX*dz;
    dz = sinX*y + cosX*dz;

    if(dz < -zoom + 50) return;

    let scale = zoom/(zoom+dz);

    let px = dx*scale + canvas.width/2;
    let py = dy*scale + canvas.height/2;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px,py,size*scale,0,Math.PI*2);
    ctx.fill();
}

draw();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Final PRO</title>

<style>
body{margin:0;overflow:hidden;background:black;}
canvas{display:block;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* рҹҺ® CONTROL */
let angleX = 0, angleY = 0, zoom = 700;
let dragging=false;

window.addEventListener("mousedown",()=>dragging=true);
window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",e=>{
    if(dragging){
        angleY += e.movementX*0.004;
        angleX += e.movementY*0.004;
    }
});

window.addEventListener("wheel",e=>{
    zoom += e.deltaY*0.3;
    zoom = Math.max(300, Math.min(1400, zoom));
});

/* вӯҗ ESTRELLAS */
let stars=[];
for(let i=0;i<1200;i++){
    stars.push({
        x:(Math.random()-0.5)*4000,
        y:(Math.random()-0.5)*4000,
        z:(Math.random()-0.5)*4000,
        size:Math.random()*2,
        blink:Math.random()*100
    });
}

/* рҹҢ  FUGACES */
let shootingStars=[];
setInterval(()=>{
    if(shootingStars.length<3 && Math.random()<0.5){
        shootingStars.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height/2,
            vx:-12-Math.random()*6,
            vy:6+Math.random()*3,
            life:0,max:50
        });
    }
},800);

/* рҹ’¬ FRASES */
let frases = [
"ЙҙбҙҸs бҙ„бҙҸЙҙбҙҸбҙ„бҙҮбҙҚбҙҸs?","бҙҚбҙҮ бҙ„бҙҖбҙҮs КҷЙӘбҙҮЙҙ","КңбҙҸКҹбҙҖ, бҙңЙҙЙӘбҙ бҙҮКҖsбҙҸ","бҙ„бҙҸЙӘЙҙбҙ„ЙӘбҙ…ЙӘКҖ бҙ„бҙҸЙҙбҙӣЙӘЙўбҙҸ",
"бҙҳбҙңЙҙбҙӣбҙҸ бҙ…бҙҮ бҙҳбҙҖКҖбҙӣЙӘбҙ…бҙҖ","КңбҙҖКҷКҹбҙҮбҙҚбҙҸs бҙңЙҙ бҙ…ЙӘМҒбҙҖ","КҷбҙңбҙҮЙҙбҙҖ бҙ ЙӘКҷКҖбҙҖ бҙҖЗ«бҙңЙӘМҒ","бҙ„бҙҖТ“бҙҮМҒ бҙҳбҙҮЙҙбҙ…ЙӘбҙҮЙҙбҙӣбҙҮ",
"sбҙҸЙҙКҖЙӘsбҙҖ бҙӣбҙңКҸбҙҖ","бҙ…бҙҮsбҙӣЙӘЙҙбҙҸ КҖбҙҖКҖбҙҸ",

"КҷКҖЙӘКҹКҹбҙҖs бҙ…ЙӘsбҙӣЙӘЙҙбҙӣбҙҸ","бҙҮКҖбҙҮs бҙҚЙӘ бҙ„бҙҸЙҙsбҙӣбҙҮКҹбҙҖбҙ„ЙӘбҙҸМҒЙҙ Т“бҙҖбҙ бҙҸКҖЙӘбҙӣбҙҖ",
"бҙҮЙҙбҙӣКҖбҙҮ бҙӣбҙҖЙҙбҙӣбҙҖs бҙҮsбҙӣКҖбҙҮКҹКҹбҙҖs, бҙӣбҙңМҒ","бҙҸМҒКҖКҷЙӘбҙӣбҙҖ бҙ„бҙҮКҖбҙ„бҙҖ бҙ…бҙҮ бҙӣЙӘ",
"ЙўКҖбҙҖбҙ бҙҮбҙ…бҙҖбҙ… бҙӣбҙңКҸбҙҖ","бҙҳбҙҸКҹбҙ бҙҸ бҙ…бҙҮ бҙҮsбҙӣКҖбҙҮКҹКҹбҙҖs","Кҹбҙңбҙў sбҙңбҙҖбҙ бҙҮ",
"бҙҳКҹбҙҖЙҙбҙҮбҙӣбҙҖ бҙҳбҙҸКҖ бҙ…бҙҮsбҙ„бҙңКҷКҖЙӘКҖ","бҙҮбҙ„КҹЙӘбҙҳsбҙҮ бҙ…бҙҮ бҙҳбҙҖКҹбҙҖКҷКҖбҙҖs","ЙҙбҙҸбҙ„КңбҙҮ бҙ„бҙҸЙҙ бҙӣбҙң ЙҙбҙҸбҙҚКҷКҖбҙҮ",

"бҙҚбҙҮ ЙўбҙңsбҙӣбҙҖ бҙӣбҙң бҙҮЙҙбҙҮКҖЙўЙӘМҒбҙҖ","З«бҙңбҙҮМҒ КҷбҙҸЙҙЙӘбҙӣбҙҸ бҙ„КҖбҙңбҙўбҙҖКҖЙҙбҙҸs",
"бҙҳбҙҮЗ«бҙңбҙҮЙҙМғбҙҖ бҙ„бҙҸЙӘЙҙбҙ„ЙӘбҙ…бҙҮЙҙбҙ„ЙӘбҙҖ","бҙҚбҙҮ КңбҙҖбҙ„бҙҮs бҙҮКҹ бҙ…ЙӘМҒбҙҖ",
"бҙӣЙӘбҙҮЙҙбҙҮs бҙҖКҹЙўбҙҸ бҙҮsбҙҳбҙҮбҙ„ЙӘбҙҖКҹ","бҙ„бҙҸЙҙбҙӣЙӘЙўбҙҸ sбҙҮ бҙ бҙҮ КҷЙӘбҙҮЙҙ",
"бҙ„бҙңКҖЙӘбҙҸsЙӘбҙ…бҙҖбҙ… бҙҳбҙҸКҖ бҙӣЙӘ","КҷбҙңбҙҮЙҙ КңбҙҖКҹКҹбҙҖбҙўЙўбҙҸ","бҙҚбҙҮ бҙҖЙўКҖбҙҖбҙ…бҙҖs","бҙ„бҙҖsбҙңбҙҖКҹЙӘбҙ…бҙҖбҙ… КҹЙӘЙҙбҙ…бҙҖ",

"ВҝКҸ sЙӘ КңбҙҖКҷКҹбҙҖбҙҚбҙҸs?","ВҝбҙңЙҙ бҙ…ЙӘМҒбҙҖ ЙҙбҙҸs КҖбҙҮЙӘМҒбҙҚбҙҸs?",
"ВҝбҙӣбҙҮ бҙ…бҙҮбҙҠбҙҖs бҙ„бҙҸЙҙбҙҸбҙ„бҙҮКҖ?","ВҝЗ«бҙңбҙҮМҒ бҙӣбҙҖКҹ бҙңЙҙ КңбҙҸКҹбҙҖ?",
"Вҝбҙ„бҙҸЙӘЙҙбҙ„ЙӘбҙ…ЙӘбҙҚбҙҸs КҹбҙңбҙҮЙўбҙҸ?","ВҝбҙӣЙӘбҙҮЙҙбҙҮs 5 бҙҚЙӘЙҙбҙңбҙӣбҙҸs?",
"ВҝбҙӣбҙҮ бҙ„бҙңбҙҮЙҙбҙӣбҙҸ бҙҖКҹЙўбҙҸ?","Вҝбҙ„бҙҖТ“бҙҮМҒ sЙӘЙҙ бҙҳКҖбҙҮsЙӘбҙҸМҒЙҙ?",
"ВҝбҙҚбҙҮ бҙ…бҙҖs бҙ„КңбҙҖЙҙбҙ„бҙҮ?","ВҝКҸ sЙӘ sЙӘМҒ?",

"sЙӘКҹбҙҮЙҙбҙ„ЙӘбҙҸ КҷбҙҸЙҙЙӘбҙӣбҙҸ бҙ„бҙҸЙҙбҙӣЙӘЙўбҙҸ","бҙҚбҙҸбҙҚбҙҮЙҙбҙӣбҙҸ З«бҙңбҙҮ ЙҙбҙҸ бҙҳбҙҖsбҙҖ",
"sбҙңsбҙңКҖКҖбҙҸ бҙ…бҙҮ З«бҙңЙӘбҙўбҙҖМҒ","бҙҮsбҙҳбҙҖбҙ„ЙӘбҙҸ бҙҳбҙҖКҖбҙҖ бҙ…бҙҸs",
"ЙӘбҙ…бҙҮбҙҖ бҙ…бҙҮ ЙҙбҙҸsбҙҸбҙӣКҖбҙҸs","бҙӣЙӘбҙҮбҙҚбҙҳбҙҸ бҙ…бҙҮбҙӣбҙҮЙҙЙӘбҙ…бҙҸ",
"бҙҚЙӘКҖбҙҖбҙ…бҙҖ З«бҙңбҙҮ бҙ бҙңбҙҮКҹбҙ бҙҮ","КҖЙӘsбҙҖ бҙҳбҙҮЙҙбҙ…ЙӘбҙҮЙҙбҙӣбҙҮ",
"КңЙӘsбҙӣбҙҸКҖЙӘбҙҖ sЙӘЙҙ бҙҮsбҙ„КҖЙӘКҷЙӘКҖ","бҙҳбҙҸsЙӘКҷЙӘКҹЙӘбҙ…бҙҖбҙ… бҙҖКҷЙӘбҙҮКҖбҙӣбҙҖ",

"бҙҮsбҙӣбҙҸ бҙҮКҖбҙҖ бҙҳбҙҖКҖбҙҖ бҙӣЙӘ","бҙҸбҙҠбҙҖКҹбҙҖМҒ бҙӣбҙҮ ЙўбҙңsбҙӣбҙҖКҖбҙҖ","бҙҳбҙҮЙҙsбҙҮМҒ бҙҮЙҙ бҙӣЙӘ",
"sбҙҸКҹбҙҸ З«бҙңбҙҮКҖЙӘМҒбҙҖ бҙҖКҹбҙҮЙўКҖбҙҖКҖбҙӣбҙҮ","бҙҚбҙҸбҙӣЙӘбҙ бҙҸ: бҙӣбҙңМҒ",
"sбҙҸЙҙКҖЙӘsбҙҖ Кҷбҙңsбҙ„бҙҖбҙ…бҙҖ","КңбҙҮбҙ„КңбҙҸ бҙ„бҙҸЙҙ ЙўбҙҖЙҙбҙҖs","бҙҳбҙҖКҖбҙҖ бҙӣбҙң бҙ…ЙӘМҒбҙҖ","бҙҮsбҙҳбҙҮКҖбҙҸ sбҙңбҙҚбҙҖКҖ",

"бҙ„КңбҙҖКҖКҹбҙҖ sЙӘЙҙ КҖбҙҮКҹбҙҸбҙҠ","КңбҙҮКҹбҙҖбҙ…бҙҸ КҸ ЙҙбҙҖбҙ…бҙҖ бҙҚбҙҖМҒs",
"бҙ„бҙҖбҙҚЙӘЙҙбҙҖКҖ sЙӘЙҙ КҖбҙңбҙҚКҷбҙҸ","бҙҳбҙҖКҹбҙҖКҷКҖбҙҖs sбҙңбҙҮКҹбҙӣбҙҖs",
"бҙӣбҙҖКҖбҙ…бҙҮ бҙӣКҖбҙҖЙҙЗ«бҙңЙӘКҹбҙҖ","КҖЙӘsбҙҖ Т“бҙҖМҒбҙ„ЙӘКҹ",
"бҙ„бҙҸбҙҚбҙҳбҙҖЙҙМғЙӘМҒбҙҖ sЙӘбҙҚбҙҳКҹбҙҮ","бҙҳКҹбҙҖЙҙ бҙ„бҙҮКҖбҙҸ",
"sбҙҸКҹбҙҸ бҙҮsбҙӣбҙҖКҖ","sЙӘЙҙ бҙҮxбҙҳбҙҮбҙ„бҙӣбҙҖбҙӣЙӘбҙ бҙҖs",

"З«бҙңбҙҮМҒбҙ…бҙҖбҙӣбҙҮ бҙңЙҙ КҖбҙҖбҙӣбҙҸ","бҙҚбҙҮ ЙўбҙңsбҙӣбҙҖ бҙҮsбҙӣбҙҸ",
"бҙҖЗ«бҙңЙӘМҒ бҙҮsбҙӣбҙҸКҸ","бҙҳбҙҸКҖ sЙӘ З«бҙңЙӘбҙҮКҖбҙҮs",
"бҙ„бҙңбҙҖЙҙбҙ…бҙҸ З«бҙңЙӘбҙҮКҖбҙҖs","sЙӘЙҙ бҙҳКҖЙӘsбҙҖ",
"КҸбҙҸ ЙӘЙҙбҙ ЙӘбҙӣбҙҸ КҹбҙҖ КҖЙӘsбҙҖ","бҙӣбҙңМҒ бҙҳбҙҸЙҙбҙҮs бҙҮКҹ бҙ„бҙңбҙҖМҒЙҙбҙ…бҙҸ",
"ЙҙбҙҸs КҹбҙҮбҙҮбҙҚбҙҸs","бҙ„бҙҸЙҙбҙӣЙӘЙҙбҙңбҙҖКҖбҙҖМҒ..."
];

let frasesData=[];

/* рҹҢҢ GALAXIA */
let particles=[];
let total=8000, arms=4;

for(let i=0;i<total;i++){

    let radius=Math.random()*420;
    let branch=(i%arms)*(Math.PI*2/arms);

    let spin=radius*0.025;
    let angle=branch+spin;

    let width=40;
    let offset=(Math.random()-0.5)*width;
    let angleNoise=(Math.random()-0.5)*0.15;

    let tx=Math.cos(angle+angleNoise)*(radius+offset);
    let tz=Math.sin(angle+angleNoise)*(radius+offset);

    let thickness=30*(1-radius/420);
    let ty=(Math.random()-0.5)*thickness;

    particles.push({
        x:(Math.random()-0.5)*2500,
        y:(Math.random()-0.5)*2500,
        z:(Math.random()-0.5)*2500,
        tx,ty,tz,
        size:Math.random()*1.4
    });
}

/* вҸі TIEMPO */
let start=Date.now();
let duration=6000;

/* рҹҢҖ GIRO GLOBAL */
let globalRotation = 0;

/* рҹ’¬ CONTROL APARICIГ“N */
let nextPhraseIndex = 0;
let phraseTimer = 0;

/* рҹҺ¬ LOOP */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let t=(Date.now()-start)/duration;
    if(t>1) t=1;

    globalRotation += 0.002;

    /* вӯҗ fondo */
    stars.forEach(s=>{
        s.blink+=0.08;
        let b=0.5+Math.sin(s.blink)*0.5;
        drawPoint(s.x,s.y,s.z,`rgba(255,255,255,${b})`,s.size);
    });

    /* рҹҢҢ galaxia */
    particles.forEach(p=>{
        let x=p.x+(p.tx-p.x)*t;
        let y=p.y+(p.ty-p.y)*t;
        let z=p.z+(p.tz-p.z)*t;

        if(t===1){
            let ang=Math.atan2(z,x)+globalRotation;
            let dist=Math.sqrt(x*x+z*z);
            x=Math.cos(ang)*dist;
            z=Math.sin(ang)*dist;
        }

        let dist=Math.sqrt(x*x+z*z);
        let mix=dist/420;

        let r=80,g=140,b=255;

        if(mix>0.4){
            r+=30*(mix-0.4);
            g-=20*(mix-0.4);
            b-=30*(mix-0.4);
        }

        if(mix>0.7){
            r+=40*(mix-0.7);
            g-=20*(mix-0.7);
            b-=40*(mix-0.7);
        }

        if(mix<0.15){
            r=130;g=180;b=255;
        }

        drawPoint(x,y,z,`rgb(${r},${g},${b})`,p.size);
    });

    /* рҹ’¬ APARICIГ“N PROGRESIVA */
    if(t===1){
        phraseTimer++;
        if(phraseTimer > 15 && nextPhraseIndex < frases.length){

            let i = nextPhraseIndex;
            let radius = 120 + i*4;
            let branch=(i%4)*(Math.PI*2/4);
            let spin=radius*0.025;
            let angle=branch+spin;

            frasesData.push({
                texto:frases[i],
                radius,
                angle,
                opacity:0
            });

            nextPhraseIndex++;
            phraseTimer = 0;
        }
    }

    /* рҹ’¬ DIBUJAR FRASES */
    frasesData.forEach(f=>{

        f.opacity += 0.03;
        if(f.opacity > 1) f.opacity = 1;

        let ang = f.angle + globalRotation;

        let x=Math.cos(ang)*f.radius;
        let z=Math.sin(ang)*f.radius;
        let y=0;

        let cosY=Math.cos(angleY);
        let sinY=Math.sin(angleY);
        let dx=cosY*x - sinY*z;
        let dz=sinY*x + cosY*z;

        let cosX=Math.cos(angleX);
        let sinX=Math.sin(angleX);
        let dy=cosX*y - sinX*dz;
        dz=sinX*y + cosX*dz;

        if(dz<-zoom+50) return;

        let scale=zoom/(zoom+dz);

        let px=dx*scale + canvas.width/2;
        let py=dy*scale + canvas.height/2;

        ctx.fillStyle=`rgba(255,255,255,${f.opacity})`;
        ctx.font=`${14*scale}px 'Segoe UI','Arial Unicode MS',sans-serif`;
        ctx.fillText(f.texto,px,py);

        f.angle += 0.002;
    });

    /* рҹҢ  fugaces */
    shootingStars.forEach((s,i)=>{
        ctx.beginPath();
        ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x+50,s.y-25);
        ctx.strokeStyle="white";
        ctx.lineWidth=2;
        ctx.stroke();

        s.x+=s.vx;
        s.y+=s.vy;
        s.life++;
        if(s.life>s.max) shootingStars.splice(i,1);
    });
/* рҹ–ӢпёҸ MARCA DE AGUA */
ctx.save();

ctx.fillStyle = "rgba(255,255,255,0.5)";
ctx.font = "14px 'Segoe UI', Arial, sans-serif";
ctx.textAlign = "right";

ctx.fillText("De: Diego.D", canvas.width - 20, canvas.height - 30);
ctx.fillText("Para: Maria.C", canvas.width - 20, canvas.height - 10);

ctx.restore();
    requestAnimationFrame(draw);
}

/* рҹ§  PROYECCIГ“N */
function drawPoint(x,y,z,color,size){

    let cosY=Math.cos(angleY), sinY=Math.sin(angleY);
    let dx=cosY*x - sinY*z;
    let dz=sinY*x + cosY*z;

    let cosX=Math.cos(angleX), sinX=Math.sin(angleX);
    let dy=cosX*y - sinX*dz;
    dz=sinX*y + cosX*dz;

    if(dz<-zoom+50) return;

    let scale=zoom/(zoom+dz);

    let px=dx*scale + canvas.width/2;
    let py=dy*scale + canvas.height/2;

    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(px,py,size*scale,0,Math.PI*2);
    ctx.fill();
}

draw();
</script>

</body>
</html>

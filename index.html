document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let yaw = 0, pitch = 0;
document.addEventListener("mousemove", e => {
    yaw -= e.movementX * 0.0025;
    pitch -= e.movementY * 0.0025;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));

const starGeo = new THREE.BufferGeometry();
let starVertices = [];

for (let i = 0; i < 3000; i++) {
    starVertices.push(
        (Math.random()-0.5)*200,
        (Math.random()-0.5)*200,
        (Math.random()-0.5)*200
    );
}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));

const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.5});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ================= GALAXY =================
const galaxy = new THREE.Group();
scene.add(galaxy);

let particles = [];
let particleGeo = new THREE.BufferGeometry();
let positions = [];

const PARTICLE_COUNT = 6000;

for (let i = 0; i < PARTICLE_COUNT; i++) {
    let r = Math.random()*18;
    let angle = r * 1.5;
    let x = Math.cos(angle) * r;
    let z = Math.sin(angle) * r;
    let y = (Math.random()-0.5)*2;

    positions.push(x,y,z);
}

particleGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));

const particleMat = new THREE.PointsMaterial({
    size: 0.2,
    color: 0x7aa2ff
});

const galaxyPoints = new THREE.Points(particleGeo, particleMat);
galaxy.add(galaxyPoints);

// ================= SHOOTING STARS =================
let shootingStars = [];

function createShootingStar(){
    if(shootingStars.length >= 3) return;

    let geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0],3));

    let mat = new THREE.PointsMaterial({color:0xffffff,size:1});
    let star = new THREE.Points(geo,mat);

    star.position.set(
        (Math.random()-0.5)*100,
        (Math.random()-0.5)*100,
        (Math.random()-0.5)*100
    );

    star.velocity = new THREE.Vector3(
        (Math.random()-0.5)*2,
        (Math.random()-0.5)*2,
        (Math.random()-0.5)*2
    );

    scene.add(star);
    shootingStars.push(star);

    setTimeout(()=>{
        scene.remove(star);
        shootingStars = shootingStars.filter(s=>s!==star);
    },1500);
}

let textSprites = [];

function createText(text, angle, radius){
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 512;
    canvas.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText(text, 20, 64);

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({map: texture, transparent:true});
    const sprite = new THREE.Sprite(material);

    sprite.position.set(
        Math.cos(angle)*radius,
        0,
        Math.sin(angle)*radius
    );

    sprite.scale.set(10,3,1);
    sprite.material.opacity = 0;

    galaxy.add(sprite);
    textSprites.push(sprite);

    // fade in
    let opacity = 0;
    let interval = setInterval(()=>{
        opacity += 0.05;
        sprite.material.opacity = opacity;
        if(opacity >= 1) clearInterval(interval);
    },50);
}

// aparición progresiva
let i = 0;
setInterval(()=>{
    if(i < frases.length){
        createText(frases[i], i*0.5, 10 + Math.random()*8);
        i++;
    }

// ================= ANIMATE =================
function animate(){
    requestAnimationFrame(animate);

    // movimiento
    let speed = 0.5;

    let dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    if(keys["w"]) camera.position.add(dir.clone().multiplyScalar(speed));
    if(keys["s"]) camera.position.add(dir.clone().multiplyScalar(-speed));

    let right = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

    if(keys["a"]) camera.position.add(right.clone().multiplyScalar(speed));
    if(keys["d"]) camera.position.add(right.clone().multiplyScalar(-speed));

    if(keys["q"]) camera.position.y += speed;
    if(keys["e"]) camera.position.y -= speed;

    camera.lookAt(0,0,0);

    // rotación galaxia
    galaxy.rotation.y += 0.0015;

    // shooting stars
    if(Math.random() < 0.02) createShootingStar();

    shootingStars.forEach(s=>{
        s.position.add(s.velocity);
    });

    renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

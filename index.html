<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia PRO</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 CONTROL */
let angleX = 0;
let angleY = 0;
let zoom = 700;

let dragging = false;

window.addEventListener("mousedown", ()=> dragging=true);
window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(dragging){
        angleY += e.movementX * 0.004;
        angleX += e.movementY * 0.004;
    }
});

window.addEventListener("wheel", e=>{
    zoom += e.deltaY * 0.3;
    if(zoom < 300) zoom = 300;
    if(zoom > 1400) zoom = 1400;
});

/* ⭐ ESTRELLAS FONDO */
let stars=[];
for(let i=0;i<1000;i++){
    stars.push({
        x:(Math.random()-0.5)*4000,
        y:(Math.random()-0.5)*4000,
        z:(Math.random()-0.5)*4000,
        size:Math.random()*1.5,
        blink:Math.random()*100
    });
}

/* 🌠 ESTRELLAS FUGACES */
let shootingStars=[];

function spawnShootingStar(){
    if(shootingStars.length >= 3) return;

    shootingStars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height/2,
        vx:-12 - Math.random()*6,
        vy:6 + Math.random()*3,
        life:0,
        maxLife:50
    });
}

setInterval(()=>{
    if(Math.random() < 0.6){
        spawnShootingStar();
    }
}, 700);

/* 🌌 GALAXIA */
let particles=[];
let total = 7000;
let arms = 4;

for(let i=0;i<total;i++){

    let radius = Math.random()*450;
    let branch = (i % arms) * (Math.PI*2/arms);

    let spin = radius * 0.04;
    let angle = branch + spin;

    let randomX = (Math.random()-0.5)*30;
    let randomZ = (Math.random()-0.5)*30;

    let tx = Math.cos(angle)*radius + randomX;
    let tz = Math.sin(angle)*radius + randomZ;

    /* 🔥 PROFUNDIDAD REAL */
    let thickness = 80 * (1 - radius/450);
    let ty = (Math.random()-0.5) * thickness;

    particles.push({
        x:(Math.random()-0.5)*2500,
        y:(Math.random()-0.5)*2500,
        z:(Math.random()-0.5)*2500,

        tx,ty,tz,

        size:Math.random()*1.5
    });
}

/* ⏳ ANIMACIÓN */
let startTime = Date.now();
let duration = 6000;

/* 🎬 LOOP */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let t = (Date.now() - startTime) / duration;
    if(t > 1) t = 1;

    /* ⭐ FONDO */
    stars.forEach(s=>{
        s.blink += 0.05;
        let brightness = (Math.sin(s.blink)+1)/2;
        drawPoint(s.x,s.y,s.z,`rgba(255,255,255,${brightness})`,s.size);
    });

    /* 🌌 GALAXIA */
    particles.forEach(p=>{

        let x = p.x + (p.tx - p.x)*t;
        let y = p.y + (p.ty - p.y)*t;
        let z = p.z + (p.tz - p.z)*t;

        /* giro continuo */
        if(t === 1){
            let ang = Math.atan2(z,x)+0.002;
            let dist = Math.sqrt(x*x+z*z);
            x = Math.cos(ang)*dist;
            z = Math.sin(ang)*dist;
        }

        /* 🎨 COLORES PRO */
        let dist = Math.sqrt(x*x+z*z);
        let mix = dist/450;

        let r = 80;
        let g = 120;
        let b = 255;

        if(mix > 0.3){
            r += 100 * (mix - 0.3);
            b -= 40 * (mix - 0.3);
        }

        if(mix > 0.6){
            r += 120 * (mix - 0.6);
            b -= 80 * (mix - 0.6);
        }

        if(mix < 0.15){
            r += 120;
            g += 100;
            b += 150;
        }

        drawPoint(x,y,z,`rgb(${r},${g},${b})`,p.size);
    });

    /* 🌠 FUGACES */
    shootingStars.forEach((s,i)=>{

        ctx.beginPath();
        ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x + 50, s.y - 25);
        ctx.strokeStyle="white";
        ctx.lineWidth=2;
        ctx.stroke();

        s.x += s.vx;
        s.y += s.vy;
        s.life++;

        if(s.life > s.maxLife){
            shootingStars.splice(i,1);
        }
    });

    requestAnimationFrame(draw);
}

/* 🧠 PROYECCIÓN */
function drawPoint(x,y,z,color,size){

    let cosY = Math.cos(angleY);
    let sinY = Math.sin(angleY);
    let dx = cosY*x - sinY*z;
    let dz = sinY*x + cosY*z;

    let cosX = Math.cos(angleX);
    let sinX = Math.sin(angleX);
    let dy = cosX*y - sinX*dz;
    dz = sinX*y + cosX*dz;

    if(dz < -zoom + 50) return;

    let scale = zoom/(zoom+dz);

    let px = dx*scale + canvas.width/2;
    let py = dy*scale + canvas.height/2;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px,py,size*scale,0,Math.PI*2);
    ctx.fill();
}

draw();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 POSICIÓN DE CÁMARA */
let camX = 0;
let camY = 0;

/* 🎮 CONTROL CON MOUSE (movimiento libre) */
window.addEventListener("mousemove", e=>{
    let dx = (e.clientX - canvas.width/2);
    let dy = (e.clientY - canvas.height/2);

    camX += dx * 0.0005;
    camY += dy * 0.0005;
});

/* 🌟 ESTRELLAS */
let estrellas=[];
for(let i=0;i<200;i++){
    estrellas.push({
        x:(Math.random()-0.5)*2000,
        y:(Math.random()-0.5)*2000,
        size:Math.random()*2
    });
}

/* 🌌 GALAXIA */
let particles=[];
for(let i=0;i<1200;i++){
    particles.push({
        angle:Math.random()*Math.PI*2,
        radius:Math.random()*300,
        speed:0.001 + Math.random()*0.002,
        size:Math.random()*1.5,
        color:Math.random()>0.5?"#5b8cff":"#8a4dff"
    });
}

/* 🎬 ANIMACIÓN */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    /* ✨ ESTRELLAS (con movimiento de cámara) */
    estrellas.forEach(s=>{
        let x = cx + s.x - camX*200;
        let y = cy + s.y - camY*200;

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(x,y,s.size,0,Math.PI*2);
        ctx.fill();
    });

    /* 🌌 GALAXIA */
    particles.forEach(p=>{
        p.angle += p.speed;

        let x = cx + Math.cos(p.angle)*p.radius - camX*400;
        let y = cy + Math.sin(p.angle)*p.radius*0.6 - camY*400;

        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(x,y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

/* canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
}

/* frases */
.frase{
    position:absolute;
    color:#d0d8ff;
    font-size:14px;
    pointer-events:none;
    transform:translate(-50%, -50%);
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* MOUSE */
let mouseX = 0;
let mouseY = 0;

window.addEventListener("mousemove", e=>{
    mouseX = e.clientX;
    mouseY = e.clientY;
});

/* ESTRELLAS */
let estrellas=[];
for(let i=0;i<150;i++){
    estrellas.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*0.02
    });
}

/* GALAXIA (ARREGLADA) */
let particles=[];
for(let i=0;i<700;i++){
    particles.push({
        angle:Math.random()*Math.PI*2,
        radius:Math.random()*250,
        speed:0.001 + Math.random()*0.002,
        size:Math.random()*1.5,
        color:Math.random()>0.5?"#4da6ff":"#8a4dff"
    });
}

/* FRASES */
const textos = ["Eres mi universo","Siempre tú","Eres luz","Mi galaxia","Te pienso","Eres infinito"];

let frases=[];

function crearFrase(){
    let el=document.createElement("div");
    el.className="frase";
    el.innerText=textos[Math.floor(Math.random()*textos.length)];

    document.body.appendChild(el);

    frases.push({
        el,
        x:Math.random()*canvas.width,
        y:canvas.height + 50,
        state:"sube",
        angle:Math.random()*Math.PI*2,
        radius:100 + Math.random()*150,
        speed:0.002 + Math.random()*0.002
    });
}

setInterval(crearFrase,1000);

/* ANIMACIÓN */
function animar(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* estrellas */
    estrellas.forEach(s=>{
        s.size += Math.sin(Date.now()*s.speed)*0.02;

        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fill();
    });

    /* centro con movimiento */
    let cx = canvas.width/2 + (mouseX - canvas.width/2)*0.05;
    let cy = canvas.height/2 + (mouseY - canvas.height/2)*0.05;

    /* galaxia */
    particles.forEach(p=>{
        p.angle += p.speed;

        let x = cx + Math.cos(p.angle)*p.radius;
        let y = cy + Math.sin(p.angle)*p.radius*0.6;

        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(x,y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    /* frases */
    frases.forEach(f=>{
        if(f.state==="sube"){
            f.y -= 1.5;

            if(f.y < canvas.height/2){
                f.state="orbita";
            }
        }else{
            f.angle += f.speed;

            f.x = cx + Math.cos(f.angle)*f.radius;
            f.y = cy + Math.sin(f.angle)*f.radius*0.6;
        }

        f.el.style.left = f.x + "px";
        f.el.style.top = f.y + "px";
    });

    requestAnimationFrame(animar);
}

animar();
</script>

</body>
</html>

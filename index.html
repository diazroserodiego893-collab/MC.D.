<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Ajustada</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 CONTROL */
let angleX = 0;
let angleY = 0;
let zoom = 700;

let dragging = false;

window.addEventListener("mousedown", ()=> dragging=true);
window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(dragging){
        angleY += e.movementX * 0.004;
        angleX += e.movementY * 0.004;
    }
});

window.addEventListener("wheel", e=>{
    zoom += e.deltaY * 0.3;
    if(zoom < 300) zoom = 300;
    if(zoom > 1400) zoom = 1400;
});

/* ⭐ ESTRELLAS FONDO */
let stars=[];
for(let i=0;i<1200;i++){
    stars.push({
        x:(Math.random()-0.5)*4000,
        y:(Math.random()-0.5)*4000,
        z:(Math.random()-0.5)*4000,
        size:Math.random()*2,
        blink:Math.random()*100
    });
}

/* 🌠 FUGACES */
let shootingStars=[];
function spawnShootingStar(){
    if(shootingStars.length >= 3) return;

    shootingStars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height/2,
        vx:-12 - Math.random()*6,
        vy:6 + Math.random()*3,
        life:0,
        maxLife:50
    });
}
setInterval(()=>{
    if(Math.random() < 0.5){
        spawnShootingStar();
    }
}, 800);

/* 🌌 GALAXIA */
let particles=[];
let total = 8000;
let arms = 4;

for(let i=0;i<total;i++){

    let radius = Math.random()*420;
    let branch = (i % arms) * (Math.PI*2/arms);

    let spin = radius * 0.025;
    let angle = branch + spin;

    let width = 40;
    let offset = (Math.random()-0.5)*width;
    let angleNoise = (Math.random()-0.5)*0.15;

    let tx = Math.cos(angle + angleNoise)*(radius + offset);
    let tz = Math.sin(angle + angleNoise)*(radius + offset);

    let thickness = 30 * (1 - radius/420);
    let ty = (Math.random()-0.5)*thickness;

    particles.push({
        x:(Math.random()-0.5)*2500,
        y:(Math.random()-0.5)*2500,
        z:(Math.random()-0.5)*2500,

        tx,ty,tz,
        size:Math.random()*1.4
    });
}

/* ⏳ FORMACIÓN */
let startTime = Date.now();
let duration = 6000;

/* 🎬 LOOP */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let t = (Date.now() - startTime) / duration;
    if(t > 1) t = 1;

    /* ⭐ estrellas */
    stars.forEach(s=>{
        s.blink += 0.08;
        let b = 0.5 + Math.sin(s.blink)*0.5;
        drawPoint(s.x,s.y,s.z,`rgba(255,255,255,${b})`,s.size);
    });

    /* 🌌 galaxia */
    particles.forEach(p=>{

        let x = p.x + (p.tx - p.x)*t;
        let y = p.y + (p.ty - p.y)*t;
        let z = p.z + (p.tz - p.z)*t;

        if(t === 1){
            let ang = Math.atan2(z,x)+0.002;
            let dist = Math.sqrt(x*x+z*z);
            x = Math.cos(ang)*dist;
            z = Math.sin(ang)*dist;
        }

        /* 🎨 COLOR AJUSTADO */
        let dist = Math.sqrt(x*x+z*z);
        let mix = dist/420;

        let r = 80;
        let g = 140;
        let b = 255;

        if(mix > 0.4){
            r += 30 * (mix - 0.4);
            g -= 20 * (mix - 0.4);
            b -= 30 * (mix - 0.4);
        }

        if(mix > 0.7){
            r += 40 * (mix - 0.7);
            g -= 20 * (mix - 0.7);
            b -= 40 * (mix - 0.7);
        }

        /* 🌟 centro suave (NO brillante) */
        if(mix < 0.15){
            r = 140;
            g = 190;
            b = 255;
        }

        drawPoint(x,y,z,`rgb(${r},${g},${b})`,p.size);
    });

    /* 🌠 fugaces */
    shootingStars.forEach((s,i)=>{
        ctx.beginPath();
        ctx.moveTo(s.x,s.y);
        ctx.lineTo(s.x+50,s.y-25);
        ctx.strokeStyle="white";
        ctx.lineWidth=2;
        ctx.stroke();

        s.x += s.vx;
        s.y += s.vy;
        s.life++;

        if(s.life > s.maxLife){
            shootingStars.splice(i,1);
        }
    });

    requestAnimationFrame(draw);
}

/* 🧠 PROYECCIÓN */
function drawPoint(x,y,z,color,size){

    let cosY = Math.cos(angleY);
    let sinY = Math.sin(angleY);
    let dx = cosY*x - sinY*z;
    let dz = sinY*x + cosY*z;

    let cosX = Math.cos(angleX);
    let sinX = Math.sin(angleX);
    let dy = cosX*y - sinX*dz;
    dz = sinX*y + cosX*dz;

    if(dz < -zoom + 50) return;

    let scale = zoom/(zoom+dz);

    let px = dx*scale + canvas.width/2;
    let py = dy*scale + canvas.height/2;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px,py,size*scale,0,Math.PI*2);
    ctx.fill();
}

draw();
</script>

</body>
</html>

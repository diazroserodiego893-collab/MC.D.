<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
}

/* Marca de agua */
#watermark {
    position: fixed;
    bottom: 10px;
    right: 15px;
    color: rgba(255,255,255,0.7);
    text-shadow: 0 0 10px rgba(255,255,255,0.8);
    font-size: 14px;
}
</style>
</head>

<body>

<div id="watermark">
De: Diego.D<br>Para: Maria.C
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ================= CONTROLES =================
let keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", e => {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
});

camera.position.set(0,5,40);

// ================= ESTRELLAS FONDO =================
const starGeo = new THREE.BufferGeometry();
const starCount = 5000;
let starPositions = [];

for(let i=0;i<starCount;i++){
    starPositions.push(
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300,
        (Math.random()-0.5)*300
    );
}

starGeo.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(starPositions,3)
);

const starMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.6
});

const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ================= GALAXIA =================
const galaxy = new THREE.Group();
scene.add(galaxy);

const PARTICLE_COUNT = 9000;
const positions = [];
const colors = [];

for(let i=0;i<PARTICLE_COUNT;i++){

    let radius = Math.random()*20;
    let spin = radius * 1.5;

    let x = Math.cos(spin) * radius;
    let z = Math.sin(spin) * radius;
    let y = (Math.random()-0.5)*3;

    positions.push(x,y,z);

    // colores azul / morado
    let color = new THREE.Color(
        0.5 + Math.random()*0.5,
        0.5,
        1
    );

    colors.push(color.r, color.g, color.b);
}

const geo = new THREE.BufferGeometry();
geo.setAttribute("position", new THREE.Float32BufferAttribute(positions,3));
geo.setAttribute("color", new THREE.Float32BufferAttribute(colors,3));

const mat = new THREE.PointsMaterial({
    size: 0.25,
    vertexColors: true
});

const points = new THREE.Points(geo, mat);
galaxy.add(points);

// ================= FORMACION =================
let startTime = Date.now();
let forming = true;

// ================= FRASES =================
let frases = [
"ᴍᴇ ɢᴜsᴛᴀʀɪ́ᴀ ᴄᴏɴᴏᴄᴇʀᴛᴇ ✨","ᴍɪ ᴍᴏᴛɪᴠᴏ ᴇʀᴇs ᴛᴜ́ 💙","ʜᴏʟᴀ, ᴜɴɪᴠᴇʀsᴏ 🌌",
"ᴍɪ sᴜᴇʀᴛᴇ ғᴜᴇ ᴄᴏɴᴏᴄᴇʀᴛᴇ ✨","ɴᴏ ᴘᴇʀᴅᴀᴍᴏs ʟᴀ ᴏᴘᴏʀᴛᴜɴɪᴅᴀᴅ 💫",
"ɴᴏ ᴛᴇ sᴀᴄᴏ ᴅᴇ ᴍɪ ᴍᴇɴᴛᴇ 🌙","ᴅᴇᴊᴇᴍᴏs ᴇʟ ᴍɪᴇᴅᴏ ✨","¿ᴄʜᴀʀʟᴀ ʏ ᴜɴ ʜᴇʟᴀᴅᴏ? 🍦",
"ᴇsᴀ sᴏɴʀɪsᴀ ᴛᴜʏᴀ 😊","ᴍɪ ᴅᴇʙɪʟɪᴅᴀᴅ 💙",

"ɪʟᴜᴍɪɴᴀs ᴍɪ ᴠɪᴅᴀ ✨","ʟᴀ ᴇsᴛʀᴇʟʟᴀ ǫᴜᴇ ᴍᴀ́s ʙʀɪʟʟᴀ ᴇʀᴇs ᴛᴜ́ 🌟",
"ᴇɴᴛʀᴇ ᴛᴀɴᴛᴀs ᴇsᴛʀᴇʟʟᴀs, ᴛᴜ́ 💫","ǫᴜɪᴇʀᴏ sᴇʀ ᴘᴀʀᴛᴇ ᴅᴇ ᴛᴜ ᴜɴɪᴠᴇʀsᴏ 🌌",
"ɢʀᴀᴠᴇᴅᴀᴅ ᴛᴜʏᴀ 🪐","ᴘᴏʟᴠᴏ ᴅᴇ ᴇsᴛʀᴇʟʟᴀs ✨","ʟᴜᴢ sᴜᴀᴠᴇ 🌙",
"¿ʏ sɪ ᴅᴇsᴄᴜʙʀɪᴍᴏs ᴜɴ ᴍᴜɴᴅᴏ? 🌍","ᴘᴇʀғᴇᴄᴛᴀ ᴄᴏᴍᴏ ᴜɴ ᴇᴄʟɪᴘsᴇ 🌘","ɴᴏᴄʜᴇ ᴄᴏɴ ᴛᴜ ɴᴏᴍʙʀᴇ 🌌"
];

let textSprites = [];

function createText(text, angle, radius){

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 512;
    canvas.height = 128;

    ctx.fillStyle = "white";
    ctx.font = "28px Arial";
    ctx.fillText(text, 20, 64);

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
    });

    const sprite = new THREE.Sprite(material);

    sprite.position.set(
        Math.cos(angle)*radius,
        0,
        Math.sin(angle)*radius
    );

    sprite.scale.set(10,3,1);
    sprite.material.opacity = 0;

    galaxy.add(sprite);
    textSprites.push(sprite);

    let op = 0;
    let fade = setInterval(()=>{
        op += 0.05;
        sprite.material.opacity = op;
        if(op>=1) clearInterval(fade);
    },50);
}

// aparición progresiva
let fi = 0;
setInterval(()=>{
    if(!forming && fi < frases.length){
        createText(frases[fi], fi*0.4, 10 + Math.random()*10);
        fi++;
    }
},700);

// ================= SHOOTING STARS =================
let shooting = [];

function createShooting(){
    if(shooting.length >= 3) return;

    let geo = new THREE.BufferGeometry();
    geo.setAttribute("position", new THREE.Float32BufferAttribute([0,0,0],3));

    let mat = new THREE.PointsMaterial({color:0xffffff,size:1});

    let s = new THREE.Points(geo,mat);

    s.position.set(
        (Math.random()-0.5)*100,
        (Math.random()-0.5)*100,
        (Math.random()-0.5)*100
    );

    s.vel = new THREE.Vector3(
        (Math.random()-0.5)*3,
        (Math.random()-0.5)*3,
        (Math.random()-0.5)*3
    );

    scene.add(s);
    shooting.push(s);

    setTimeout(()=>{
        scene.remove(s);
        shooting = shooting.filter(x=>x!==s);
    },1200);
}

// ================= ANIMATE =================
function animate(){
    requestAnimationFrame(animate);

    let elapsed = (Date.now() - startTime)/1000;

    // FORMACION
    if(forming){
        let progress = Math.min(elapsed/6,1);
        galaxy.scale.set(progress,progress,progress);
        if(progress>=1) forming = false;
    }

    // movimiento
    let speed = 0.8;

    let dir = new THREE.Vector3();
    camera.getWorldDirection(dir);

    if(keys["w"]) camera.position.add(dir.clone().multiplyScalar(speed));
    if(keys["s"]) camera.position.add(dir.clone().multiplyScalar(-speed));

    let right = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

    if(keys["a"]) camera.position.add(right.clone().multiplyScalar(speed));
    if(keys["d"]) camera.position.add(right.clone().multiplyScalar(-speed));

    if(keys["q"]) camera.position.y += speed;
    if(keys["e"]) camera.position.y -= speed;

    camera.lookAt(0,0,0);

    // rotaciones
    galaxy.rotation.y += 0.0025;
    stars.rotation.y += 0.0003;

    // shooting stars
    if(Math.random()<0.03) createShooting();

    shooting.forEach(s=>{
        s.position.add(s.vel.clone().multiplyScalar(2.5));
    });

    renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener("resize",()=>{
    camera.aspect = innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,window.innerHeight);
});
</script>

</body>
</html>

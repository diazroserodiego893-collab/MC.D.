<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

/* canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
}

/* frases */
.frase{
    position:absolute;
    color:#cfd8ff;
    font-size:14px;
    pointer-events:none;
    white-space:nowrap;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* 🎮 MOUSE */
let mouse = {x:0,y:0};
window.addEventListener("mousemove", e=>{
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

/* 🌟 ESTRELLAS */
let estrellas=[];
for(let i=0;i<200;i++){
    estrellas.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*2,
        speed:Math.random()*0.02
    });
}

/* 🌌 GALAXIA (ESPIRAL REAL) */
let particles=[];
for(let i=0;i<800;i++){
    particles.push({
        angle:Math.random()*Math.PI*2,
        radius:Math.random()*300,
        speed:0.001 + Math.random()*0.002,
        size:Math.random()*1.5,
        color:Math.random()>0.5?"#5b7fff":"#8a4dff"
    });
}

/* 💬 FRASES */
const frasesTexto = [
"Eres mi universo","Todo empieza contigo","Azul infinito","Entre estrellas te pienso",
"Nada brilla como tú","Eres mi galaxia","Perdido en ti","Eres luz","Siempre tú",
"Sin gravedad contigo","Eres arte","Más allá del cielo","Eres infinito","Mi paz",
"Eres destino","Luz en la oscuridad","Contigo todo","Te encuentro en todo",
"Mi universo eres tú","Eres magia","Eres mi centro","Siempre vuelvo a ti",
"Mi lugar seguro","Eres eterno","Mi todo","Mi calma","Eres único",
"Brillas más","Eres especial","Eres razón","Mi cielo","Mi verdad",
"Te elijo siempre","Mi estrella","Mi mundo","Mi razón","Eres perfecto",
"Eres real","Mi todo eres tú","Mi infinito","Siempre tú","Mi universo azul",
"Mi galaxia","Mi espacio","Mi razón de ser","Siempre presente","Mi energía","Mi todo"
];

let frases=[];

function crearFrase(){
    let el=document.createElement("div");
    el.className="frase";
    el.innerText=frasesTexto[Math.floor(Math.random()*frasesTexto.length)];

    document.body.appendChild(el);

    frases.push({
        el,
        x:Math.random()*canvas.width,
        y:canvas.height + 20,
        state:"subiendo",
        angle:Math.random()*Math.PI*2,
        radius:100 + Math.random()*200,
        speed:0.002 + Math.random()*0.003
    });
}

setInterval(crearFrase,700);

/* 🎬 ANIMACION */
function animar(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* estrellas */
    estrellas.forEach(s=>{
        s.size += Math.sin(Date.now()*s.speed)*0.02;
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
        ctx.fill();
    });

    let cx = canvas.width/2 + (mouse.x - canvas.width/2)*0.05;
    let cy = canvas.height/2 + (mouse.y - canvas.height/2)*0.05;

    /* galaxia */
    particles.forEach(p=>{
        p.angle += p.speed;

        let x = cx + Math.cos(p.angle) * p.radius;
        let y = cy + Math.sin(p.angle) * p.radius * 0.6;

        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(x,y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    /* frases */
    frases.forEach(f=>{
        if(f.state==="subiendo"){
            f.y -= 1.5;

            if(f.y < canvas.height/2){
                f.state="orbita";
            }

            f.el.style.left = f.x + "px";
            f.el.style.top = f.y + "px";

        }else{
            f.angle += f.speed;

            let x = cx + Math.cos(f.angle) * f.radius;
            let y = cy + Math.sin(f.angle) * f.radius * 0.6;

            f.el.style.left = x + "px";
            f.el.style.top = y + "px";
        }
    });

    requestAnimationFrame(animar);
}

animar();
</script>

</body>
</html>

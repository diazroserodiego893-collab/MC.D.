<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia Real</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}
canvas{
    display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* 🎮 CONTROL */
let angleX = 0;
let angleY = 0;
let zoom = 600;

let dragging = false;

window.addEventListener("mousedown", ()=> dragging=true);
window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
    if(dragging){
        angleY += e.movementX * 0.004;
        angleX += e.movementY * 0.004;
    }
});

window.addEventListener("wheel", e=>{
    zoom += e.deltaY * 0.3;
    if(zoom < 300) zoom = 300;
    if(zoom > 1200) zoom = 1200;
});

/* 🌠 ESTRELLAS DE FONDO */
let stars=[];
for(let i=0;i<400;i++){
    stars.push({
        x:(Math.random()-0.5)*2000,
        y:(Math.random()-0.5)*2000,
        z:(Math.random()-0.5)*2000,
        size:Math.random()*1.5
    });
}

/* 🌌 GALAXIA ESPIRAL REAL */
let particles=[];
let total = 6000;
let arms = 4;

for(let i=0;i<total;i++){

    let radius = Math.random()*400;
    let branch = (i % arms) * (Math.PI*2/arms);

    let spin = radius * 0.02;

    let angle = branch + spin;

    // dispersión suave
    let randomX = (Math.random()-0.5)*20;
    let randomY = (Math.random()-0.5)*10;
    let randomZ = (Math.random()-0.5)*20;

    let x = Math.cos(angle)*radius + randomX;
    let z = Math.sin(angle)*radius + randomZ;

    // altura tipo disco
    let y = randomY;

    // color gradiente
    let mix = radius / 400;

    let r = 150 + 100*(1-mix);
    let g = 100 + 80*(1-mix);
    let b = 255;

    particles.push({
        x,y,z,
        size:Math.random()*1.5,
        color:`rgb(${r},${g},${b})`
    });
}

/* 🎬 LOOP */
function draw(){

    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    /* ⭐ fondo */
    stars.forEach(s=>{
        drawPoint(s.x,s.y,s.z,"white",s.size);
    });

    /* 🌌 galaxia */
    particles.forEach(p=>{
        drawPoint(p.x,p.y,p.z,p.color,p.size);
    });

    requestAnimationFrame(draw);
}

function drawPoint(x,y,z,color,size){

    let cosY = Math.cos(angleY);
    let sinY = Math.sin(angleY);
    let dx = cosY*x - sinY*z;
    let dz = sinY*x + cosY*z;

    let cosX = Math.cos(angleX);
    let sinX = Math.sin(angleX);
    let dy = cosX*y - sinX*dz;
    dz = sinX*y + cosX*dz;

    if(dz < -zoom + 50) return;

    let scale = zoom/(zoom+dz);

    let px = dx*scale + canvas.width/2;
    let py = dy*scale + canvas.height/2;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(px,py,size*scale,0,Math.PI*2);
    ctx.fill();
}

draw();
</script>

</body>
</html>
